<!-- Livro — Estilos base compartilhados (inclua uma vez) -->
<style>
  .lv {
    --w:200px;
    --d:10px;
    --color:#F0BF4F;
    --fg:#111;
    width:var(--w); height:calc(var(--w) * 1.32);
    perspective:1400px;
    display:inline-block;
  }
  .lv-inner{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transform:rotateY(0) rotateX(0);
    transition:transform .5s ease-out;
  }
  .lv:hover .lv-inner{ transform:rotateY(-28deg) rotateX(4deg); }

  .lv-pages, .lv-spine{ opacity:0; transition:opacity .5s ease-out; }
  .lv:hover .lv-pages, .lv:hover .lv-spine{ opacity:1; }

  .lv-pages{
    position:absolute; top:4px; bottom:4px; right:0; width:var(--d);
    transform:translateZ(calc(var(--d) / -2)) translateX(calc(var(--d) / 2)) rotateY(90deg);
    background:repeating-linear-gradient(90deg,#f5f5f5 0 1px,#e0e0e0 1px 2px);
    border-radius:2px;
  }
  .lv-spine{
    position:absolute; top:0; bottom:0; left:0; width:var(--d);
    transform:translateZ(calc(var(--d) / -2)) translateX(calc(var(--d) / -2)) rotateY(-90deg);
    background:linear-gradient(180deg,var(--color),color-mix(in oklab,var(--color) 70%,black));
    border-radius:2px;
  }

  .lv-cover{
    position:absolute; inset:0;
    background:#fff; border-radius:8px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 12px 24px -16px rgba(0,0,0,.25),0 2px 6px rgba(0,0,0,.08),inset 0 0 0 1px rgba(0,0,0,.06);
  }
  .lv-top{ position:relative; height:52%; background:var(--color); }
  .lv.stripe .lv-top::after{
    content:""; position:absolute; left:0; right:0; bottom:18%; height:6px;
    background:color-mix(in oklab,var(--color) 55%,black); opacity:.55;
  }
  .lv-bottom{
    flex:1; padding:16px;
    display:flex; flex-direction:column; justify-content:space-between;
    color:var(--fg);
  }
  .lv-title{
    font:700 17px/1.15 'Anek Latin',system-ui;
    letter-spacing:-.01em; margin:0;
  }
  .lv-mark{ width:18px; height:18px; }
</style>
