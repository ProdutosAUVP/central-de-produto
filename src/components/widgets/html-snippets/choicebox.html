<!-- Choicebox (Geist) — HTML / CSS standalone -->
<style>
  .gx-choice-group {
    display:flex; gap:12px; flex-wrap:wrap;
    font-family:'Roboto', sans-serif;
  }
  .gx-choice-group.column { flex-direction:column; flex-wrap:nowrap; }
  .gx-choice-label {
    font-size:12px;
    color:hsl(var(--muted-foreground, 110 10% 40%));
    margin-bottom:8px; display:block;
  }
  .gx-choice {
    display:flex; align-items:flex-start; gap:12px;
    padding:12px; min-width:200px; flex:1;
    border:1px solid hsl(var(--border, 120 10% 88%));
    border-radius:12px; cursor:pointer;
    background:hsl(var(--background, 0 0% 100%));
    color:hsl(var(--foreground, 110 78% 9%));
    transition:all .15s; text-align:left;
  }
  .gx-choice:hover { border-color:hsl(var(--foreground, 110 78% 9%) / 0.3); }
  .gx-choice--selected {
    border-color:hsl(var(--primary, 155 93% 11%));
    background:hsl(var(--primary, 155 93% 11%) / 0.05);
  }
  .gx-choice input { position:absolute; opacity:0; pointer-events:none; }
  .gx-choice__indicator {
    width:16px; height:16px; flex-shrink:0; margin-top:2px;
    border:1px solid hsl(var(--input, 120 10% 88%));
    background:hsl(var(--background, 0 0% 100%));
    display:inline-flex; align-items:center; justify-content:center;
    transition:.15s;
  }
  .gx-choice--radio .gx-choice__indicator { border-radius:9999px; }
  .gx-choice--checkbox .gx-choice__indicator { border-radius:4px; }
  .gx-choice--selected .gx-choice__indicator {
    background:hsl(var(--primary, 155 93% 11%));
    border-color:hsl(var(--primary, 155 93% 11%));
  }
  .gx-choice--radio.gx-choice--selected .gx-choice__indicator::after {
    content:""; width:6px; height:6px; border-radius:9999px;
    background:hsl(var(--primary-foreground, 0 0% 100%));
  }
  .gx-choice--checkbox.gx-choice--selected .gx-choice__indicator::after {
    content:""; width:8px; height:8px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
    background-size:contain; background-repeat:no-repeat;
  }
  .gx-choice__body { display:flex; flex-direction:column; }
  .gx-choice__title { font-size:14px; font-weight:500; color:hsl(var(--foreground, 110 78% 9%)); }
  .gx-choice__desc { font-size:12px; color:hsl(var(--muted-foreground, 110 10% 40%)); margin-top:2px; }
  .gx-choice[aria-disabled="true"], .gx-choice:has(input:disabled) {
    opacity:.5; cursor:not-allowed; pointer-events:none;
  }
</style>

<!-- Radio Group (default selecionado: Pro Trial) -->
<div class="gx-choice-group" role="radiogroup" aria-label="Selecione um plano">
  <label class="gx-choice gx-choice--radio gx-choice--selected">
    <input type="radio" name="plan" value="trial" checked />
    <span class="gx-choice__indicator"></span>
    <span class="gx-choice__body">
      <span class="gx-choice__title">Pro Trial</span>
      <span class="gx-choice__desc">Grátis por duas semanas</span>
    </span>
  </label>
  <label class="gx-choice gx-choice--radio">
    <input type="radio" name="plan" value="pro" />
    <span class="gx-choice__indicator"></span>
    <span class="gx-choice__body">
      <span class="gx-choice__title">Pro</span>
      <span class="gx-choice__desc">Comece agora</span>
    </span>
  </label>
</div>

<!-- Checkbox Group (multi-select) -->
<div class="gx-choice-group" role="group" aria-label="Selecione um plano" style="margin-top:24px;">
  <label class="gx-choice gx-choice--checkbox">
    <input type="checkbox" name="plans" value="trial" />
    <span class="gx-choice__indicator"></span>
    <span class="gx-choice__body">
      <span class="gx-choice__title">Pro Trial</span>
      <span class="gx-choice__desc">Grátis por duas semanas</span>
    </span>
  </label>
  <label class="gx-choice gx-choice--checkbox">
    <input type="checkbox" name="plans" value="pro" />
    <span class="gx-choice__indicator"></span>
    <span class="gx-choice__body">
      <span class="gx-choice__title">Pro</span>
      <span class="gx-choice__desc">Comece agora</span>
    </span>
  </label>
</div>

<!-- Grupo desabilitado + item individual desabilitado -->
<div style="display:flex; flex-direction:column; gap:24px; margin-top:24px;">
  <div>
    <span class="gx-choice-label">Grupo desabilitado</span>
    <div class="gx-choice-group" role="radiogroup" aria-label="Grupo desabilitado">
      <label class="gx-choice gx-choice--radio">
        <input type="radio" disabled />
        <span class="gx-choice__indicator"></span>
        <span class="gx-choice__body">
          <span class="gx-choice__title">Pro Trial</span>
          <span class="gx-choice__desc">Grátis por duas semanas</span>
        </span>
      </label>
      <label class="gx-choice gx-choice--radio">
        <input type="radio" disabled />
        <span class="gx-choice__indicator"></span>
        <span class="gx-choice__body">
          <span class="gx-choice__title">Pro</span>
          <span class="gx-choice__desc">Comece agora</span>
        </span>
      </label>
    </div>
  </div>

  <div>
    <span class="gx-choice-label">Item individual desabilitado</span>
    <div class="gx-choice-group" role="group" aria-label="Item individual desabilitado">
      <label class="gx-choice gx-choice--checkbox">
        <input type="checkbox" disabled />
        <span class="gx-choice__indicator"></span>
        <span class="gx-choice__body">
          <span class="gx-choice__title">Pro Trial</span>
          <span class="gx-choice__desc">Grátis por duas semanas</span>
        </span>
      </label>
      <label class="gx-choice gx-choice--checkbox">
        <input type="checkbox" />
        <span class="gx-choice__indicator"></span>
        <span class="gx-choice__body">
          <span class="gx-choice__title">Pro</span>
          <span class="gx-choice__desc">Comece agora</span>
        </span>
      </label>
    </div>
  </div>
</div>

<script>
  // Toggle visual (radio: único; checkbox: independente)
  document.querySelectorAll('.gx-choice-group').forEach(group => {
    group.querySelectorAll('.gx-choice').forEach(item => {
      item.addEventListener('click', () => {
        const input = item.querySelector('input');
        if (!input || input.disabled) return;
        if (input.type === 'radio') {
          group.querySelectorAll('.gx-choice').forEach(i => i.classList.remove('gx-choice--selected'));
          item.classList.add('gx-choice--selected');
        } else {
          item.classList.toggle('gx-choice--selected');
        }
      });
    });
  });
</script>
